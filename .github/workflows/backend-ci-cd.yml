name: Backend CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "Backend/**"
      - ".dockerignore"
      - ".github/workflows/backend-ci-cd.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "Backend/**"
      - ".dockerignore"
      - ".github/workflows/backend-ci-cd.yml"
  workflow_dispatch:
    inputs:
      full_deploy:
        description: "Run full deploy (build + push + deploy to server)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# PR runs can be cancelled. Main deploy runs should queue so an in-flight
# deploy is not killed by the next commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://lifeorganize:lifeorganize@localhost:5432/lifeorganize
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        working-directory: Backend
        run: |
          uv venv --python 3.14
          source .venv/bin/activate
          uv pip install -r requirements.txt
      - name: Run tests
        working-directory: Backend
        run: |
          source .venv/bin/activate
          python -m pytest tests

  lint-ruff:
    name: Lint · Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install Ruff
        working-directory: Backend
        run: |
          uv venv --python 3.14
          uv pip install ruff==0.14.9
      - name: Ruff check
        working-directory: Backend
        run: |
          source .venv/bin/activate
          ruff check app tests infra/scripts

  compile:
    name: Compile
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - test-backend
      - lint-ruff
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        working-directory: Backend
        run: |
          uv venv --python 3.14
          source .venv/bin/activate
          uv pip install -r requirements.txt
      - name: Compile Python modules
        working-directory: Backend
        run: |
          source .venv/bin/activate
          python -m compileall app tests infra/scripts

  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: compile
    if: >-
      (github.event_name == 'push' && github.ref_name == 'main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.full_deploy == 'true')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Compute image tags
        id: image-tags
        run: |
          REPO="ghcr.io/${{ github.repository }}-api"
          SHORT_SHA="${GITHUB_SHA::7}"
          {
            echo "tags<<EOF"
            echo "${REPO}:${SHORT_SHA}"
            echo "${REPO}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Backend/infra/api.Dockerfile
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
          cache-from: type=gha,scope=life-organize-api
          cache-to: type=gha,mode=max,scope=life-organize-api

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build
    if: >-
      (github.event_name == 'push' && github.ref_name == 'main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.full_deploy == 'true')
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          GH_REPO: ${{ github.repository }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GH_REF: ${{ github.ref_name }}
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_BEFORE: ${{ github.event.before }}
          GH_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_TOKEN,GH_ACTOR,GH_REPO,DEPLOY_PATH,GH_REF,GH_EVENT_NAME,GH_BEFORE,GH_SHA
          script: |
            set -euo pipefail

            BASE_DIR="$DEPLOY_PATH"
            REPO_URL="https://x-access-token:${GHCR_TOKEN}@github.com/${GH_REPO}.git"
            BRANCH="${GH_REF}"

            echo "Ensuring base directory exists..."
            mkdir -p "$BASE_DIR"
            cd "$BASE_DIR"

            if [ ! -d ".git" ]; then
              echo "No git repo found. Initializing..."
              git init
              git remote add origin "$REPO_URL"
            else
              echo "Updating remote URL with token..."
              git remote set-url origin "$REPO_URL"
            fi

            echo "Fetching latest code..."
            git fetch origin

            echo "Resetting to origin/$BRANCH..."
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git reset --hard "origin/$BRANCH"

            CADDY_CHANGED=false
            if [ "${GH_EVENT_NAME:-}" = "push" ] && [ -n "${GH_BEFORE:-}" ] && [ -n "${GH_SHA:-}" ]; then
              if git diff --name-only "$GH_BEFORE" "$GH_SHA" -- Backend/infra/Caddyfile | grep -q "Backend/infra/Caddyfile"; then
                CADDY_CHANGED=true
              fi
            fi

            if [ "$CADDY_CHANGED" = true ]; then
              echo "Detected Backend/infra/Caddyfile change. Updating active Caddy config..."

              if [ ! -f "Backend/infra/Caddyfile" ]; then
                echo "ERROR: Backend/infra/Caddyfile missing in repo checkout"
                exit 1
              fi

              if [ ! -f "/etc/caddy/Caddyfile" ]; then
                echo "ERROR: /etc/caddy/Caddyfile not found on server"
                exit 1
              fi

              if ! sudo -n true 2>/dev/null; then
                echo "ERROR: deploy user requires passwordless sudo for Caddy update commands."
                exit 1
              fi

              sudo python3 Backend/infra/scripts/update_caddy_site_block.py \
                Backend/infra/Caddyfile \
                /etc/caddy/Caddyfile \
                life.dock108.dev

              sudo caddy validate --config /etc/caddy/Caddyfile
              sudo systemctl reload caddy
              echo "Caddy reload complete."
            else
              echo "No Backend/infra/Caddyfile change detected; skipping Caddy update."
            fi

            if [ ! -f "Backend/.env" ]; then
              echo "ERROR: Backend/.env file missing in $BASE_DIR"
              exit 1
            fi

            echo "Changing to Backend/infra directory..."
            cd Backend/infra

            echo "Logging into GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            echo "Pre-deploy cleanup..."
            docker image prune -af 2>/dev/null || true
            docker builder prune -af 2>/dev/null || true

            echo "Pulling images..."
            docker compose --env-file ../.env --profile prod pull --policy always

            echo "Running migrations..."
            docker compose --env-file ../.env --profile prod run --rm migrate

            echo "Starting services..."
            docker compose --env-file ../.env --profile prod up -d --remove-orphans --force-recreate postgres api

            echo "Verifying API health..."
            for i in $(seq 1 30); do
              if docker inspect lifeorganize-api --format='{{.State.Health.Status}}' 2>/dev/null | grep -q healthy; then
                echo "API container healthy"
                break
              fi
              STATUS=$(docker inspect lifeorganize-api --format='{{.State.Status}}' 2>/dev/null || echo "missing")
              if [ "$STATUS" = "exited" ] || [ "$STATUS" = "missing" ]; then
                echo "API container failed to start (status: $STATUS)"
                docker logs lifeorganize-api --tail=80 2>/dev/null || true
                exit 1
              fi
              echo "  Waiting for API health check ($i/30)..."
              sleep 5
            done

            FINAL_STATUS=$(docker inspect lifeorganize-api --format='{{.State.Health.Status}}' 2>/dev/null || echo "unknown")
            if [ "$FINAL_STATUS" != "healthy" ]; then
              echo "API did not become healthy within 150s (status: $FINAL_STATUS)"
              docker logs lifeorganize-api --tail=80 2>/dev/null || true
              exit 1
            fi

            echo "Verifying container image SHA..."
            image_tag=$(docker inspect lifeorganize-api --format='{{.Config.Image}}')
            pulled_sha=$(docker image inspect "$image_tag" --format='{{.Id}}')
            running_sha=$(docker inspect lifeorganize-api --format='{{.Image}}')
            if [ "$pulled_sha" != "$running_sha" ]; then
              echo "lifeorganize-api is running a stale image."
              echo "pulled:  $pulled_sha"
              echo "running: $running_sha"
              exit 1
            fi

            echo "Post-deploy cleanup..."
            docker image prune -af
            docker builder prune -af

            echo "Deployment status:"
            docker compose --env-file ../.env --profile prod ps
