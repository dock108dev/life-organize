x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

name: lifeorganize

services:
  postgres:
    image: postgres:16-alpine
    container_name: lifeorganize-postgres
    profiles: ["dev", "prod"]
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lifeorganize}
      POSTGRES_USER: ${POSTGRES_USER:-lifeorganize}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lifeorganize}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lifeorganize}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/dock108dev/life-organize-api:${IMAGE_TAG:-latest}
    build:
      context: ../..
      dockerfile: Backend/infra/api.Dockerfile
    container_name: lifeorganize-api
    profiles: ["dev", "prod"]
    logging: *default-logging
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lifeorganize}:${POSTGRES_PASSWORD:-lifeorganize}@postgres:5432/${POSTGRES_DB:-lifeorganize}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5}
      LIFE_ORGANIZE_ADMIN_API_KEY: ${LIFE_ORGANIZE_ADMIN_API_KEY:-}
      DEVICE_TOKEN_SIGNING_SECRET: ${DEVICE_TOKEN_SIGNING_SECRET:-development-device-token-secret}
      DEVICE_RATE_LIMIT_REQUESTS: ${DEVICE_RATE_LIMIT_REQUESTS:-60}
      DEVICE_RATE_LIMIT_WINDOW_SECONDS: ${DEVICE_RATE_LIMIT_WINDOW_SECONDS:-3600}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - app
    ports:
      - "127.0.0.1:${API_PORT:-8787}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

networks:
  internal:
    internal: true
  app:
    driver: bridge
